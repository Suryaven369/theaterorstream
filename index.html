  <!-- Inline critical CSS to prevent flash -->
  <style>
    html, body {
      background-color: #0a0a0a;
      margin: 0;
      padding: 0;
    }
    #root {
      min-height: 100vh;
      background-color: #0a0a0a;
    }
    /* Initial loading state */
    .initial-loader {
      position: fixed;
      inset: 0;
      background-color: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .initial-loader.hide {
      opacity: 0;
      pointer-events: none;
    }
    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(245, 197, 24, 0.1);
      border-top-color: #f5c518;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

<body>
  <!-- Initial loader to prevent black screen flash -->
  <div id="initial-loader" class="initial-loader">
    <div class="loader-spinner"></div>
  </div>
  
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- Hide loader once app is ready -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('hide');
          setTimeout(function() {
            loader.remove();
          }, 300);
        }
      }, 100);
    });
  </script>
